<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Grocery Share" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="Grocery Share — Kassenbons per KI analysieren und fair aufteilen" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />

  <title>Grocery Share</title>
  <style>
    #splash {
      position: fixed; inset: 0; background: #0b1020;
      display: flex; align-items: center; justify-content: center; z-index: 99997;
      transition: opacity .45s ease; padding-top: env(safe-area-inset-top, 0px);
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash-inner { text-align: center; }
    #splash-logo {
      width: 104px; height: 104px; border-radius: 26px; margin: 0 auto;
      display: block; box-shadow: 0 0 48px rgba(52,211,153,.4);
    }
    #splash-title { font-family: system-ui, sans-serif; font-size: 1.4rem; font-weight: 900; color: #e8edf7; margin-top: 18px; letter-spacing: -.3px; }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-inner">
      <img id="splash-logo" src="./icons/icon-192.png" alt="" />
      <div id="splash-title">Grocery Share</div>
    </div>
  </div>
  <div id="app"></div>
  <div id="err" style="display:none;position:fixed;inset:0;background:#1a0000;color:#ff6b6b;padding:20px;font-family:monospace;font-size:13px;z-index:99999;overflow:auto;white-space:pre-wrap"></div>
  <script>
    // Klassisches Script (kein type="module") — fängt auch Boot-Fehler vor dem
    // Laden der App ab und schreibt sie ins selbe Diagnoseprotokoll wie
    // js/debuglog.js (Key gs_debuglog).
    function gsLogWindowError(message, extra) {
      try {
        var key = 'gs_debuglog';
        var entries = JSON.parse(localStorage.getItem(key)) || [];
        entries.push({ ts: Date.now(), category: 'window', message: message, extra: extra });
        while (entries.length > 300) entries.shift();
        localStorage.setItem(key, JSON.stringify(entries));
      } catch (e) {}
    }
    window.onerror = function (msg, src, line, col, err) {
      var d = document.getElementById('err');
      d.style.display = 'block';
      d.textContent = 'ERROR:\n' + msg + '\n\nFile: ' + src + '\nLine: ' + line + '\n\n' + (err && err.stack ? err.stack : '');
      gsLogWindowError(msg + ' (' + src + ':' + line + ')', err ? { message: err.message, name: err.name } : undefined);
    };
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
